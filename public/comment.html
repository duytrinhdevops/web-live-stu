<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Comment Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    #comments {
      position: fixed;
      bottom: 24px;
      left: 24px;
      width: 520px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      pointer-events: none;
    }

    #comments.hidden { display: none; }

    .comment {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 5px;
      background: rgba(0, 0, 0, 0.52);
      border-radius: 22px;
      padding: 6px 16px;
      backdrop-filter: blur(4px);
      animation: slideIn 0.25s ease;
      transition: opacity 0.5s ease;
      word-break: break-word;
    }

    .comment.fading { opacity: 0; }

    .username {
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    }

    .message {
      color: #fff;
      font-weight: 400;
      text-shadow: 0 1px 4px rgba(0,0,0,0.85);
      line-height: 1.4;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-18px); }
      to   { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div id="comments"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const roomId    = new URLSearchParams(location.search).get('room') || '';
    const socket    = io({ transports: ['websocket', 'polling'], reconnection: true });
    const container = document.getElementById('comments');
    socket.on('connect', () => { if (roomId) socket.emit('joinRoom', roomId); });

    const MAX_COMMENTS = 10;
    const LIFETIME_MS  = 9000;
    const FADE_MS      = 500;

    const COLORS = ['#fe2c55','#25f4ee','#ffd700','#69c9d0','#a78bfa','#34d399','#fb923c'];
    const userColorMap = new Map();

    function userColor(name) {
      if (!userColorMap.has(name)) {
        userColorMap.set(name, COLORS[userColorMap.size % COLORS.length]);
      }
      return userColorMap.get(name);
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function addComment(username, message) {
      while (container.children.length >= MAX_COMMENTS) {
        container.removeChild(container.firstChild);
      }

      const div = document.createElement('div');
      div.className = 'comment';
      div.innerHTML =
        `<span class="username" style="color:${userColor(username)}">@${escapeHtml(username)}</span>` +
        `<span class="message">${escapeHtml(message)}</span>`;
      container.appendChild(div);

      const removeTimer = setTimeout(() => {
        div.classList.add('fading');
        setTimeout(() => div.remove(), FADE_MS);
      }, LIFETIME_MS);

      div._removeTimer = removeTimer;
    }

    function applyConfig(cfg) {
      if (cfg.commentVisible !== undefined) {
        container.classList.toggle('hidden', !cfg.commentVisible);
      }
      if (cfg.commentSize !== undefined) {
        container.style.fontSize = cfg.commentSize + 'px';
      }
    }


    socket.on('commentConfig', cfg => { if (cfg) applyConfig(cfg); });

    socket.on('commentDrop', data => {
      if (!data || container.classList.contains('hidden')) return;
      addComment(data.username || 'Unknown', data.message || '');
    });

    socket.on('commentClear', () => {
      for (const el of [...container.children]) {
        clearTimeout(el._removeTimer);
        el.remove();
      }
    });

    socket.on('jarStateInit', state => { if (state) applyConfig(state); });
  </script>
</body>
</html>
