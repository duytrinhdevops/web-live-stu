<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Admin — TikTok Live</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; }
    header { padding: 16px 24px; background: #171a23; border-bottom: 1px solid #2b3040; font-size: 20px; font-weight: bold; color: #a78bfa; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 20px; }
    .card { background: #171a23; border: 1px solid #2b3040; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
    h3 { font-size: 15px; color: #93c5fd; margin-bottom: 14px; }
    .btn { border: none; border-radius: 8px; padding: 8px 16px; color: #fff; cursor: pointer; font-weight: 600; font-size: 13px; }
    .btn-purple { background: #7c3aed; }
    .btn-red    { background: #dc2626; }
    .btn-purple:hover { background: #6d28d9; }
    .btn-red:hover    { background: #b91c1c; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; color: #64748b; font-weight: 600; border-bottom: 1px solid #2b3040; }
    td { padding: 10px 12px; border-bottom: 1px solid #1e293b; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-green { background: rgba(34,197,94,.15); color: #22c55e; border: 1px solid #22c55e44; }
    .badge-gray  { background: rgba(100,116,139,.15); color: #64748b; border: 1px solid #33415544; }
    .link-block { display: flex; flex-direction: column; gap: 4px; }
    .link-row { display: flex; align-items: center; gap: 6px; }
    .link-label { color: #64748b; min-width: 80px; font-size: 11px; }
    .link-val { color: #93c5fd; font-size: 11px; font-family: monospace; word-break: break-all; flex: 1; }
    .copy-btn { background: #1e293b; border: 1px solid #334155; border-radius: 4px; color: #94a3b8; padding: 2px 6px; font-size: 10px; cursor: pointer; white-space: nowrap; }
    .copy-btn:hover { background: #334155; }
    .empty { color: #475569; font-size: 13px; padding: 20px; text-align: center; }
    .room-id { font-family: monospace; font-size: 14px; font-weight: bold; color: #a78bfa; }
  </style>
</head>
<body>
  <header>Admin — Quản lý Room</header>
  <div class="wrap">
    <div class="card">
      <h3>Tạo room mới</h3>
      <p style="font-size:13px;color:#64748b;margin-bottom:14px">Mỗi room = 1 user / idol. Tạo xong chia sẻ link Control Panel cho user.</p>
      <button class="btn btn-purple" onclick="createRoom()">+ Tạo Room Mới</button>
    </div>

    <div class="card">
      <h3>Danh sách rooms (<span id="roomCount">0</span>)</h3>
      <div id="roomList"><div class="empty">Chưa có room nào. Nhấn "Tạo Room Mới" để bắt đầu.</div></div>
    </div>
  </div>

  <script>
    const BASE = location.origin;

    function links(roomId) {
      return [
        { label: 'Control',  url: `${BASE}/?room=${roomId}` },
        { label: 'Jar OBS',  url: `${BASE}/jar.html?room=${roomId}` },
        { label: 'Comment',  url: `${BASE}/comment.html?room=${roomId}` },
        { label: 'Translate', url: `${BASE}/translate.html?room=${roomId}` },
        { label: 'Speech',   url: `${BASE}/speech-overlay.html?room=${roomId}` },
      ];
    }

    function copy(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✓ Copied';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      });
    }

    async function loadRooms() {
      const res   = await fetch('/admin/rooms');
      const rooms = await res.json();
      document.getElementById('roomCount').textContent = rooms.length;
      const el = document.getElementById('roomList');

      if (rooms.length === 0) {
        el.innerHTML = '<div class="empty">Chưa có room nào. Nhấn "Tạo Room Mới" để bắt đầu.</div>';
        return;
      }

      el.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Room ID</th>
              <th>TikTok</th>
              <th>Trạng thái</th>
              <th>Links</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${rooms.map(r => `
              <tr>
                <td><span class="room-id">${r.id}</span></td>
                <td style="color:#e2e8f0">${r.tiktokUniqueId || '<span style="color:#475569">—</span>'}</td>
                <td>
                  ${r.isConnected
                    ? '<span class="badge badge-green">Live</span>'
                    : '<span class="badge badge-gray">Offline</span>'}
                </td>
                <td>
                  <div class="link-block">
                    ${links(r.id).map(l => `
                      <div class="link-row">
                        <span class="link-label">${l.label}</span>
                        <span class="link-val">${l.url}</span>
                        <button class="copy-btn" onclick="copy('${l.url}', this)">Copy</button>
                        <a href="${l.url}" target="_blank" style="font-size:10px;color:#64748b;text-decoration:none">↗</a>
                      </div>
                    `).join('')}
                  </div>
                </td>
                <td>
                  <button class="btn btn-red" style="padding:5px 10px;font-size:12px" onclick="deleteRoom('${r.id}')">Xoá</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function createRoom() {
      const res  = await fetch('/admin/rooms/create', { method: 'POST' });
      const data = await res.json();
      if (data.roomId) {
        await loadRooms();
        // Auto open control panel for the new room
        window.open(`/?room=${data.roomId}`, '_blank');
      }
    }

    async function deleteRoom(roomId) {
      if (!confirm(`Xoá room "${roomId}"? Hành động này không thể hoàn tác.`)) return;
      await fetch(`/admin/rooms/${roomId}`, { method: 'DELETE' });
      await loadRooms();
    }

    loadRooms();
    setInterval(loadRooms, 10000); // auto refresh mỗi 10 giây
  </script>
</body>
</html>
