<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Jar 3D Split</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:transparent}
    #wrap{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
    canvas{display:block}
    #loading{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      font:700 14px Segoe UI,sans-serif;color:#fff;
      background:rgba(0,0,0,.75);padding:10px 14px;border-radius:10px;z-index:20
    }
  </style>
</head>
<body>
  <div id="loading">Đang tải ảnh lọ...</div>
  <div id="wrap"><canvas id="c"></canvas></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const {Engine,Bodies,Body,World,Events,Vector} = Matter;

    // ====== CONFIG ======
    const JAR_SRC = 'jar-default.png';
    const VW=1080, VH=1920;

    // Kích thước & vị trí ảnh lọ
    const BASE_W=360, BASE_H=560;
    const BASE_X=VW*0.72, BASE_Y=VH*0.67;

    // Tỉ lệ lòng lọ
    const INNER = {
      topYRatio:          0.05,
      shoulderYRatio:     0.22,
      bottomYRatio:       0.91,
      widthRatioTop:      0.62,
      widthRatioShoulder: 0.70,
      widthRatioBottom:   0.67
    };

    const FRONT = {
      mouthYRatio:  0.05,
      mouthHRatio:  0.04,
      mouthWRatio:  0.31,
      bottomYRatio: 0.88,
      bottomHRatio: 0.06
    };

    let allScale = 1.0;
    let mouthOpacity = 0;
    let mouthX = 0, mouthY = 0, mouthScale = 1.0;

    const GIFT_R = 18;
    const CAT_WALL = 0x0001;
    const CAT_GIFT = 0x0002;

    const GIFTS = [
      'gifts/bantim.webp','gifts/donus.webp','gifts/gg.webp','gifts/hacgiay.webp',
      'gifts/hoahong.webp','gifts/kem.webp','gifts/meo.webp','gifts/mu.webp',
      'gifts/nuochoa.webp','gifts/tiktok.webp','gifts/timcam.webp','gifts/vuongmieng.webp'
    ];

    const jar={width:1,height:1,x:0,y:0,img:null,walls:[]};
    const gift={width:1,height:1,x:0,y:0,size:1,bounce:0.02,friction:0.6,spacing:0};
    const gifts=[];
    const giftCache=new Map();
    const stickers=[
      {img:null,width:1,height:1,x:0,y:0},
      {img:null,width:1,height:1,x:0,y:0},
      {img:null,width:1,height:1,x:0,y:0},
      {img:null,width:1,height:1,x:0,y:0},
      {img:null,width:1,height:1,x:0,y:0}
    ];

    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    let dpr = 1;
    function resize(){
      dpr = window.devicePixelRatio || 1;
      const s = Math.min(innerWidth/VW, innerHeight/VH);
      canvas.width  = VW * dpr;
      canvas.height = VH * dpr;
      canvas.style.width  = (VW * s) + 'px';
      canvas.style.height = (VH * s) + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      // Re-apply after setTransform (resets state on some browsers)
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
    }
    resize();
    addEventListener('resize', resize);

    // ── Physics engine ────────────────────────────────────────────────────
    const engine = Engine.create({ gravity: { x:0, y:1.0 } });
    engine.positionIterations  = 12;  // reduced from 20 — still smooth, lighter
    engine.velocityIterations  = 8;   // reduced from 16
    engine.constraintIterations = 3;
    const world = engine.world;

    const WO = {
      isStatic: true, friction: 0.4, restitution: 0.05, frictionStatic: 0.5,
      collisionFilter: { category: CAT_WALL, mask: CAT_GIFT }
    };

    World.add(world, [
      Bodies.rectangle(VW/2,  VH+40, VW*4, 80,   WO),
      Bodies.rectangle(-40,   VH/2,  80,   VH*4, WO),
      Bodies.rectangle(VW+40, VH/2,  80,   VH*4, WO),
    ]);

    // ── Geometry cache (per-frame) ────────────────────────────────────────
    // Recomputed once per frame, invalidated whenever jar/gift transforms change
    let _giftGeomCache = null;
    let _jarGeomCache  = null;

    function invalidateGeomCache(){
      _giftGeomCache = null;
      _jarGeomCache  = null;
    }

    function jarGeom(){
      if (_jarGeomCache) return _jarGeomCache;
      const w  = BASE_W * jar.width  * allScale;
      const h  = BASE_H * jar.height * allScale;
      const cx = BASE_X + jar.x;
      const cy = BASE_Y + jar.y;
      return (_jarGeomCache = { cx, cy, w, h });
    }

    function giftGeom(){
      if (_giftGeomCache) return _giftGeomCache;
      const w  = BASE_W * gift.width  * allScale;
      const h  = BASE_H * gift.height * allScale;
      const cx = BASE_X + gift.x;
      const cy = BASE_Y + gift.y;

      const yTop      = cy - h/2 + h * INNER.topYRatio;
      const yShoulder = cy - h/2 + h * INNER.shoulderYRatio;
      const yBot      = cy - h/2 + h * INNER.bottomYRatio;

      const halfTop      = w * INNER.widthRatioTop      / 2;
      const halfShoulder = w * INNER.widthRatioShoulder / 2;
      const halfBot      = w * INNER.widthRatioBottom   / 2;

      return (_giftGeomCache = { cx, cy, w, h, yTop, yShoulder, yBot, halfTop, halfShoulder, halfBot });
    }

    function mouthCenter(){
      const g = giftGeom();
      return { cx: g.cx, y: g.yTop, halfW: g.halfTop };
    }

    // ── Physics walls ─────────────────────────────────────────────────────
    function clearJarWalls(){
      for(const w of jar.walls) World.remove(world, w);
      jar.walls = [];
    }

    function wallSegment(x1,y1,x2,y2,thickness){
      const angle = Math.atan2(y2-y1, x2-x1);
      const len   = Math.hypot(x2-x1, y2-y1);
      const b = Bodies.rectangle((x1+x2)/2,(y1+y2)/2, len+thickness, thickness, WO);
      Body.setAngle(b, angle);
      return b;
    }

    function buildJarWalls(){
      invalidateGeomCache();
      clearJarWalls();
      const g = giftGeom();
      const T = 24;
      const walls = [];

      const profilePoints = [
        [INNER.widthRatioTop,       INNER.topYRatio],
        [INNER.widthRatioTop,       INNER.topYRatio + (INNER.shoulderYRatio - INNER.topYRatio)*0.3],
        [INNER.widthRatioShoulder,  INNER.shoulderYRatio],
        [INNER.widthRatioShoulder,  INNER.shoulderYRatio + (INNER.bottomYRatio - INNER.shoulderYRatio)*0.5],
        [INNER.widthRatioBottom,    INNER.bottomYRatio],
      ];

      const pts = profilePoints.map(([wr, yr]) => ({
        xL: g.cx - g.w * wr / 2,
        xR: g.cx + g.w * wr / 2,
        y:  g.cy - g.h/2 + g.h * yr
      }));

      for(let i=0;i<pts.length-1;i++){
        walls.push(wallSegment(pts[i].xL, pts[i].y, pts[i+1].xL, pts[i+1].y, T));
        walls.push(wallSegment(pts[i].xR, pts[i].y, pts[i+1].xR, pts[i+1].y, T));
      }

      const bot = pts[pts.length-1];
      walls.push(Bodies.rectangle(g.cx, bot.y + T/2, (bot.xR-bot.xL) + T*2, T, WO));

      jar.walls = walls;
      World.add(world, walls);
    }

    function maxGiftRadius(){
      return Math.floor(giftGeom().halfTop * 0.68);
    }

    function diamondRadius(diamonds){
      const base = Math.max(8, Math.round(GIFT_R * gift.size));
      if (!diamonds || diamonds <= 1) return base;
      const factor = 1 + 0.30 * Math.log2(diamonds);
      return Math.min(maxGiftRadius(), Math.round(base * factor));
    }

    // ── Spawn ─────────────────────────────────────────────────────────────
    function spawnGiftCore(imgSrc, diamonds){
      const m = mouthCenter();
      const r = diamondRadius(diamonds || 0);
      const physR = Math.max(4, Math.round(r * (1 - gift.spacing * 0.9)));
      const x = m.cx + (Math.random()*2-1) * m.halfW * 0.45;
      const y = -r * 2;

      const body = Bodies.circle(x, y, physR, {
        friction:        gift.friction,
        frictionAir:     0.05,
        frictionStatic:  gift.friction * 0.8,
        restitution:     gift.bounce,
        density:         0.004,
        collisionFilter: { category: CAT_GIFT, mask: CAT_WALL | CAT_GIFT }
      });
      Body.setVelocity(body, { x: (Math.random()-0.5)*0.3, y: 2.5 + Math.random()*0.8 });
      Body.setAngularVelocity(body, (Math.random()-0.5)*0.06);
      World.add(world, body);
      gifts.push({ body, img: imgSrc, r });

      if(imgSrc && !giftCache.has(imgSrc)){
        const im = new Image();
        im.crossOrigin = 'anonymous';
        im.onload  = () => giftCache.set(imgSrc, im);
        im.onerror = () => {
          const fb = GIFTS[Math.floor(Math.random() * GIFTS.length)];
          const cached = giftCache.get(fb);
          if(cached) giftCache.set(imgSrc, cached);
        };
        im.src = imgSrc;
      }
    }

    function spawnGift(){
      spawnGiftCore(GIFTS[Math.floor(Math.random()*GIFTS.length)], 0);
    }

    // ── Gift queue ────────────────────────────────────────────────────────
    const giftQueue = [];
    const DRAIN_MS  = 130;

    setInterval(() => {
      if (giftQueue.length === 0) return;
      const item = giftQueue.shift();
      spawnGiftCore(item.imgSrc, item.diamonds);
    }, DRAIN_MS);

    function pruneGifts(){
      for(let i = gifts.length-1; i >= 0; i--){
        if(gifts[i].body.position.y > VH + 100){
          World.remove(world, gifts[i].body);
          gifts.splice(i, 1);
        }
      }
    }

    // ── Image loading ─────────────────────────────────────────────────────
    function loadAll(){
      return Promise.all([
        new Promise((res, rej) => {
          const im = new Image();
          im.onload  = () => { jar.img = im; res(); };
          im.onerror = () => rej(new Error('Không load được jar-default.png'));
          im.src = JAR_SRC;
        }),
        ...GIFTS.map(src => new Promise(r => {
          const im = new Image();
          im.onload  = () => { giftCache.set(src, im); r(); };
          im.onerror = () => r();
          im.src = src;
        }))
      ]);
    }

    // ── Draw helpers ──────────────────────────────────────────────────────
    function drawJarRaw(){
      const g = jarGeom();
      if(!jar.img) return;
      ctx.drawImage(jar.img, g.cx - g.w/2, g.cy - g.h/2, g.w, g.h);
    }

    // Build clip path that matches the inside of the jar
    function clipJarInnerPath(){
      const g = giftGeom();
      const profilePoints = [
        [INNER.widthRatioTop,       INNER.topYRatio],
        [INNER.widthRatioTop,       INNER.topYRatio + (INNER.shoulderYRatio - INNER.topYRatio)*0.3],
        [INNER.widthRatioShoulder,  INNER.shoulderYRatio],
        [INNER.widthRatioShoulder,  INNER.shoulderYRatio + (INNER.bottomYRatio - INNER.shoulderYRatio)*0.5],
        [INNER.widthRatioBottom,    INNER.bottomYRatio],
      ];
      const pts = profilePoints.map(([wr, yr]) => ({
        xL: g.cx - g.w * wr / 2,
        xR: g.cx + g.w * wr / 2,
        y:  g.cy - g.h/2 + g.h * yr
      }));

      ctx.beginPath();
      pts.forEach((p,i) => { i===0 ? ctx.moveTo(p.xL, p.y) : ctx.lineTo(p.xL, p.y); });
      for(let i = pts.length-1; i >= 0; i--) ctx.lineTo(pts[i].xR, pts[i].y);
      ctx.closePath();
    }

    function isInsideJar(px, py){
      const g = giftGeom();
      if(py < g.yTop - GIFT_R || py > g.yBot + GIFT_R) return false;
      let half;
      if(py <= g.yShoulder){
        const t  = Math.max(0, (py - g.yTop) / (g.yShoulder - g.yTop));
        const wr = INNER.widthRatioTop + (INNER.widthRatioShoulder - INNER.widthRatioTop) * t;
        half = g.w * wr / 2;
      } else {
        const t  = Math.min(1, (py - g.yShoulder) / (g.yBot - g.yShoulder));
        const wr = INNER.widthRatioShoulder + (INNER.widthRatioBottom - INNER.widthRatioShoulder) * t;
        half = g.w * wr / 2;
      }
      return Math.abs(px - g.cx) < half + GIFT_R * 0.5;
    }

    // Quà đang rơi từ trên (chưa vào bình)
    function drawGiftsFalling(){
      const g = giftGeom();
      for(const gft of gifts){
        const p = gft.body.position;
        if(p.y >= g.yTop) continue;
        const im = giftCache.get(gft.img); if(!im) continue;
        const R = gft.r || GIFT_R;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(gft.body.angle);
        ctx.drawImage(im, -R, -R, R*2, R*2);
        ctx.restore();
      }
    }

    // Quà trong bình — dùng ONE clip cho TẤT CẢ quà bên trong (tối ưu từ N clip→1 clip)
    function drawGiftsInside(){
      const g = giftGeom();

      // Tách quà: bên trong bình vs tràn ra ngoài
      const inJar    = [];
      const overflow = [];
      for(const gft of gifts){
        const p  = gft.body.position;
        if(p.y < g.yTop) continue;
        const im = giftCache.get(gft.img); if(!im) continue;
        if(isInsideJar(p.x, p.y)) inJar.push(gft);
        else overflow.push(gft);
      }

      // Vẽ quà trong bình: 1 lần save/clip/restore cho tất cả
      if(inJar.length > 0){
        ctx.save();
        clipJarInnerPath();
        ctx.clip();
        for(const gft of inJar){
          const p  = gft.body.position;
          const im = giftCache.get(gft.img);
          const R  = gft.r || GIFT_R;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(gft.body.angle);
          ctx.drawImage(im, -R, -R, R*2, R*2);
          ctx.restore();
        }
        ctx.restore();
      }

      // Vẽ quà tràn ra ngoài không cần clip
      for(const gft of overflow){
        const p  = gft.body.position;
        const im = giftCache.get(gft.img);
        const R  = gft.r || GIFT_R;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(gft.body.angle);
        ctx.drawImage(im, -R, -R, R*2, R*2);
        ctx.restore();
      }
    }

    function drawMouthEllipseBack(){
      if(mouthOpacity <= 0) return;
      const g  = giftGeom();
      const cx = g.cx + mouthX;
      const cy = g.yTop + mouthY;
      const rx = g.halfTop * mouthScale;
      const ry = Math.max(5, rx * 0.28);
      const mo = mouthOpacity;
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
      ctx.fillStyle = `rgba(8,12,28,${(0.70*mo).toFixed(2)})`;
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, Math.PI, Math.PI*2);
      ctx.strokeStyle = `rgba(160,200,255,${(0.40*mo).toFixed(2)})`;
      ctx.lineWidth   = Math.max(2, g.w*0.009);
      ctx.stroke();
      ctx.restore();
    }

    function drawMouthEllipseFront(){
      if(mouthOpacity <= 0) return;
      const g  = giftGeom();
      const cx = g.cx + mouthX;
      const cy = g.yTop + mouthY;
      const rx = g.halfTop * mouthScale;
      const ry = Math.max(5, rx * 0.28);
      const mo = mouthOpacity;
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI);
      ctx.strokeStyle = `rgba(255,255,255,${(0.88*mo).toFixed(2)})`;
      ctx.lineWidth   = Math.max(4, g.w*0.018);
      ctx.stroke();
      ctx.restore();
    }

    function drawStickers(){
      for(const s of stickers){
        if(!s.img) continue;
        const w  = BASE_W * s.width  * allScale;
        const h  = BASE_H * s.height * allScale;
        const cx = BASE_X + s.x;
        const cy = BASE_Y + s.y;
        ctx.drawImage(s.img, cx - w/2, cy - h/2, w, h);
      }
    }

    // ── Render loop ───────────────────────────────────────────────────────
    const SUBSTEPS = 3;
    const SUB_DT   = 1000 / 60 / SUBSTEPS;

    function loop(){
      // Invalidate geometry cache at the start of each frame
      _giftGeomCache = null;
      _jarGeomCache  = null;

      for(let i = 0; i < SUBSTEPS; i++) Engine.update(engine, SUB_DT);
      pruneGifts();
      ctx.clearRect(0, 0, VW, VH);

      drawMouthEllipseBack();   // hố đen miệng (ẩn khi mouthOpacity=0)
      drawJarRaw();             // ảnh lọ
      drawGiftsInside();        // quà trong lọ (clipped — 1 clip cho tất cả)
      drawGiftsFalling();       // quà đang rơi từ trên
      drawMouthEllipseFront();  // viền trước miệng (ẩn khi mouthOpacity=0)
      drawStickers();

      requestAnimationFrame(loop);
    }

    function syncUI(){}

    buildJarWalls();

    loadAll().then(() => {
      document.getElementById('loading').style.display = 'none';
      loop();
    }).catch(err => {
      document.getElementById('loading').textContent =
        err.message + ' | Hãy đặt đúng file jar-default.png cùng thư mục jar.html';
      console.error(err);
    });

    // ── Socket.IO ─────────────────────────────────────────────────────────
    const roomId = new URLSearchParams(location.search).get('room') || '';
    const socket = io({
      transports:          ['websocket', 'polling'],
      reconnection:        true,
      reconnectionDelay:   1000,
      reconnectionAttempts: 10
    });

    socket.on('connect', () => {
      if (roomId) socket.emit('joinRoom', roomId);
    });

    // ── Audio ─────────────────────────────────────────────────────────────
    // Shared AudioContext — created once, reused for all sounds
    let _audioCtx = null;
    function getAudioCtx(){
      if (!_audioCtx || _audioCtx.state === 'closed'){
        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      // Resume if suspended (browser autoplay policy)
      if (_audioCtx.state === 'suspended') _audioCtx.resume();
      return _audioCtx;
    }

    // Unlock AudioContext on first user interaction (required by browsers)
    document.addEventListener('click', () => { try { getAudioCtx(); } catch {} }, { once: true });

    let soundEnabled   = true;
    let giftSoundVolume  = 80;
    let giftCustomSounds = {};

    function getTierKey(diamonds) {
      if (diamonds >= 500) return '500';
      if (diamonds >= 50)  return '50';
      if (diamonds >= 5)   return '5';
      return '1';
    }

    function playCustomSound(dataUrl, vol) {
      try {
        const audio = new Audio(dataUrl);
        audio.volume = Math.min(1, Math.max(0, vol / 100));
        audio.play().catch(() => {});
      } catch {}
    }

    function playGiftSound(diamonds){
      if (!soundEnabled) return;
      const vol = giftSoundVolume;
      const customUrl = giftCustomSounds[getTierKey(diamonds)];
      if (customUrl) { playCustomSound(customUrl, vol); return; }
      try {
        const ac   = getAudioCtx();
        const osc  = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain);
        gain.connect(ac.destination);
        const t  = ac.currentTime;
        const vM = vol / 100;

        if (diamonds >= 500){
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(523, t);
          osc.frequency.setValueAtTime(659, t + 0.08);
          osc.frequency.setValueAtTime(784, t + 0.16);
          osc.frequency.setValueAtTime(1047, t + 0.24);
          gain.gain.setValueAtTime(0.35 * vM, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
          osc.start(t); osc.stop(t + 0.6);
        } else if (diamonds >= 50){
          osc.type = 'sine';
          osc.frequency.setValueAtTime(660, t);
          osc.frequency.exponentialRampToValueAtTime(880, t + 0.12);
          gain.gain.setValueAtTime(0.25 * vM, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          osc.start(t); osc.stop(t + 0.3);
        } else if (diamonds >= 5){
          osc.type = 'sine';
          osc.frequency.setValueAtTime(440, t);
          gain.gain.setValueAtTime(0.12 * vM, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
          osc.start(t); osc.stop(t + 0.15);
        } else {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(330, t);
          gain.gain.setValueAtTime(0.05 * vM, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
          osc.start(t); osc.stop(t + 0.08);
        }
        osc.onended = () => { osc.disconnect(); gain.disconnect(); };
      } catch {}
    }

    socket.on('giftDrop', data => {
      const imgSrc   = data.imgPath || GIFTS[Math.floor(Math.random() * GIFTS.length)];
      const diamonds = Number(data.diamonds || 0);
      giftQueue.push({ imgSrc, diamonds });
      playGiftSound(diamonds);
    });

    socket.on('jarReset', () => {
      giftQueue.length = 0;
      for (const g of gifts) World.remove(world, g.body);
      gifts.length = 0;
    });

    function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

    function updatePosDisplay(){}

    function applyFullState(state){
      if (!state) return;

      if (state.allScale   !== undefined) allScale    = state.allScale;
      if (state.jarWidth   !== undefined) jar.width   = state.jarWidth;
      if (state.jarHeight  !== undefined) jar.height  = state.jarHeight;
      if (state.jarX       !== undefined) jar.x       = state.jarX;
      if (state.jarY       !== undefined) jar.y       = state.jarY;
      if (state.giftWidth  !== undefined) gift.width  = state.giftWidth;
      if (state.giftHeight !== undefined) gift.height = state.giftHeight;
      if (state.giftX      !== undefined) gift.x      = state.giftX;
      if (state.giftY      !== undefined) gift.y      = state.giftY;
      if (state.giftSize     !== undefined) gift.size    = state.giftSize;
      if (state.giftBounce   !== undefined) gift.bounce  = state.giftBounce;
      if (state.giftFriction !== undefined) gift.friction = state.giftFriction;
      if (state.giftSpacing  !== undefined) gift.spacing  = state.giftSpacing;

      if (state.jarImageUrl){
        const customImg = new Image();
        customImg.onload = () => { jar.img = customImg; };
        customImg.src = state.jarImageUrl;
      }

      if (state.stickers && Array.isArray(state.stickers)){
        state.stickers.forEach((s, i) => {
          if (i >= stickers.length) return;
          if (s.width  !== undefined) stickers[i].width  = s.width;
          if (s.height !== undefined) stickers[i].height = s.height;
          if (s.x      !== undefined) stickers[i].x      = s.x;
          if (s.y      !== undefined) stickers[i].y      = s.y;
          if (s.imageUrl){
            const img = new Image();
            img.onload = () => { stickers[i].img = img; };
            img.src = s.imageUrl;
          }
        });
      }

      if (state.giftSoundVolume  !== undefined) giftSoundVolume  = state.giftSoundVolume;
      if (state.giftCustomSounds)               giftCustomSounds = { ...state.giftCustomSounds };
      syncUI(); updatePosDisplay(); buildJarWalls();
    }

    socket.on('jarStateInit', state => { applyFullState(state); });

    socket.on('giftSoundUpdated', data => {
      if (data.volume      !== undefined) giftSoundVolume  = data.volume;
      if (data.customSounds)              giftCustomSounds = { ...data.customSounds };
    });

    function applyEffectControl(control, delta){
      if (control === 'jarWidth')  jar.width  = clamp(jar.width  + delta, 0.4, 2.3);
      if (control === 'jarHeight') jar.height = clamp(jar.height + delta, 0.4, 2.3);
      if (control === 'jarX')      jar.x      = clamp(jar.x      + delta, -600, 600);
      if (control === 'jarY')      jar.y      = clamp(jar.y      + delta, -900, 900);
      syncUI(); updatePosDisplay(); buildJarWalls();
    }

    function resetEffectControl(){
      jar.width  = 1; jar.height = 1;
      jar.x      = 0; jar.y      = 0;
      gift.width = 1; gift.height = 1;
      gift.x     = 0; gift.y     = 0;
      gift.size  = 1; gift.bounce = 0.02; gift.friction = 0.6; gift.spacing = 0;
      allScale = 1.0;
      mouthOpacity = 0; mouthX = 0; mouthY = 0; mouthScale = 1.0;
      syncUI(); updatePosDisplay(); buildJarWalls();
    }

    socket.on('jarEffectControl', payload => {
      if (!payload) return;
      applyEffectControl(payload.control, Number(payload.delta || 0));
    });

    socket.on('jarEffectSet', payload => {
      if (!payload) return;
      const { control, value } = payload;
      const v = Number(value);
      if (!Number.isFinite(v)) return;

      if (control === 'jarWidth')    jar.width    = clamp(v, 0.4, 2.3);
      if (control === 'jarHeight')   jar.height   = clamp(v, 0.4, 2.3);
      if (control === 'jarX')        jar.x        = clamp(v, -600, 600);
      if (control === 'jarY')        jar.y        = clamp(v, -900, 900);
      if (control === 'giftWidth')   gift.width   = clamp(v, 0.5, 1.8);
      if (control === 'giftHeight')  gift.height  = clamp(v, 0.5, 1.8);
      if (control === 'giftX')       gift.x       = clamp(v, -600, 600);
      if (control === 'giftY')       gift.y       = clamp(v, -900, 900);
      if (control === 'giftSize')    gift.size    = clamp(v, 0.4, 1.8);
      if (control === 'giftBounce')  gift.bounce  = clamp(v, 0.0, 0.35);
      if (control === 'giftFriction') gift.friction = clamp(v, 0.1, 1.0);
      if (control === 'giftSpacing')  gift.spacing  = clamp(v, 0.0, 0.8);
      if (control === 'allScale')     { allScale    = clamp(v, 0.2, 3.0); buildJarWalls(); }
      if (control === 'mouthOpacity')  mouthOpacity = clamp(v, 0.0, 1.0);
      if (control === 'mouthX')        mouthX       = clamp(v, -400, 400);
      if (control === 'mouthY')        mouthY       = clamp(v, -400, 400);
      if (control === 'mouthScale')    mouthScale   = clamp(v, 0.2, 3.0);

      syncUI(); updatePosDisplay(); buildJarWalls();
    });

    socket.on('jarEffectReset', () => { resetEffectControl(); });

    socket.on('jarImageUpdated', payload => {
      if (!payload || !payload.imageUrl) return;
      const customImg = new Image();
      customImg.onload = () => { jar.img = customImg; };
      customImg.src = payload.imageUrl;
    });

    socket.on('stickerImageUpdated', payload => {
      if (!payload) return;
      const idx = Number(payload.index);
      if (!Number.isInteger(idx) || idx < 0 || idx >= stickers.length) return;
      stickers[idx].img = null;
      if (!payload.imageUrl) return;
      const img = new Image();
      img.onload = () => { stickers[idx].img = img; };
      img.src = payload.imageUrl;
    });

    socket.on('stickerTransformUpdated', payload => {
      if (!payload) return;
      const idx = Number(payload.index);
      if (!Number.isInteger(idx) || idx < 0 || idx >= stickers.length) return;
      const value = Number(payload.value);
      if (!Number.isFinite(value)) return;
      if (payload.field === 'width')  stickers[idx].width  = value;
      if (payload.field === 'height') stickers[idx].height = value;
      if (payload.field === 'x')      stickers[idx].x      = value;
      if (payload.field === 'y')      stickers[idx].y      = value;
    });

    socket.on('stickerReset', payload => {
      if (!payload) return;
      const idx = Number(payload.index);
      if (!Number.isInteger(idx) || idx < 0 || idx >= stickers.length) return;
      const sx = (payload.sticker && payload.sticker.x !== undefined) ? payload.sticker.x : 0;
      const sy = (payload.sticker && payload.sticker.y !== undefined) ? payload.sticker.y : 0;
      stickers[idx] = { img: null, width: 1, height: 1, x: sx, y: sy };
    });

    function spawnGiftWithImage(imgUrl){
      spawnGiftCore(imgUrl || GIFTS[Math.floor(Math.random()*GIFTS.length)]);
    }

    window.jarRain = function(){
      const testDiamonds = [1, 1, 5, 5, 10, 10, 50, 100, 500];
      for (let i = 0; i < 20; i++){
        const d = testDiamonds[Math.floor(Math.random() * testDiamonds.length)];
        giftQueue.push({ imgSrc: GIFTS[Math.floor(Math.random()*GIFTS.length)], diamonds: d });
      }
    };

    window.jarReset = function(){
      for (const g of gifts) World.remove(world, g.body);
      gifts.length = 0;
    };
  </script>
</body>
</html>
