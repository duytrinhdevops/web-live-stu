<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Alert Overlay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }

    #container {
      position: fixed;
      bottom: 40px;
      right: 40px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      pointer-events: none;
    }

    .alert-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(15,11,30,0.96) 0%, rgba(30,15,60,0.96) 100%);
      border: 2px solid #7c3aed;
      border-radius: 16px;
      padding: 14px 20px;
      min-width: 280px;
      max-width: 420px;
      box-shadow: 0 0 30px rgba(124,58,237,0.5), 0 8px 32px rgba(0,0,0,0.6);
      animation: slideIn .35s cubic-bezier(0.34,1.56,0.64,1) forwards;
      position: relative;
      overflow: hidden;
    }

    .alert-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,0.15), transparent);
      animation: shimmer 1.5s ease-in-out;
    }

    .alert-card.follow {
      border-color: #22c55e;
      background: linear-gradient(135deg, rgba(11,30,15,0.96) 0%, rgba(15,50,20,0.96) 100%);
      box-shadow: 0 0 30px rgba(34,197,94,0.5), 0 8px 32px rgba(0,0,0,0.6);
    }
    .alert-card.follow::before {
      background: linear-gradient(90deg, transparent, rgba(34,197,94,0.15), transparent);
    }

    .alert-card.exit {
      animation: slideOut .3s ease-in forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(120%) scale(.8); }
      to   { opacity: 1; transform: translateX(0)    scale(1); }
    }
    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0) scale(1); }
      to   { opacity: 0; transform: translateX(120%) scale(.8); }
    }
    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(200%); }
    }

    .alert-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      background: rgba(124,58,237,0.25);
      border: 2px solid rgba(124,58,237,0.5);
    }
    .alert-card.follow .alert-icon {
      background: rgba(34,197,94,0.25);
      border-color: rgba(34,197,94,0.5);
    }

    .alert-icon img {
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
    }

    .alert-body { flex: 1; min-width: 0; }

    .alert-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #a78bfa;
      margin-bottom: 3px;
    }
    .alert-card.follow .alert-title { color: #4ade80; }

    .alert-user {
      font-size: 16px;
      font-weight: 800;
      color: #f1f5f9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .alert-sub {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .alert-diamonds {
      font-size: 20px;
      font-weight: 800;
      color: #fbbf24;
      white-space: nowrap;
      flex-shrink: 0;
      text-shadow: 0 0 12px rgba(251,191,36,0.6);
    }

    .progress-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      animation: shrink 4s linear forwards;
      border-radius: 0 0 0 16px;
    }
    .alert-card.follow .progress-bar {
      background: linear-gradient(90deg, #16a34a, #4ade80);
    }
    @keyframes shrink {
      from { width: 100%; }
      to   { width: 0%; }
    }
  </style>
</head>
<body>
<div id="container"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const roomId = new URLSearchParams(location.search).get('room') || '';
  const socket = io({ transports: ['websocket', 'polling'], reconnection: true });
  socket.on('connect', () => { if (roomId) socket.emit('joinRoom', roomId); });

  let alertSound = true;
  socket.on('jarStateInit', s => { if (s.alertSound !== undefined) alertSound = s.alertSound; });

  // Simple beep via Web Audio
  function playBeep(type) {
    if (!alertSound) return;
    try {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      if (type === 'follow') {
        osc.frequency.setValueAtTime(660, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.15);
      } else {
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
        osc.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.2);
      }
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.4);
    } catch {}
  }

  socket.on('alertDrop', ({ type, username, giftName, diamonds, imgPath }) => {
    playBeep(type);
    showAlert({ type, username, giftName, diamonds, imgPath });
  });

  function showAlert({ type, username, giftName, diamonds, imgPath }) {
    const container = document.getElementById('container');
    const card = document.createElement('div');
    card.className = 'alert-card' + (type === 'follow' ? ' follow' : '');

    const iconHtml = (type === 'gift' && imgPath)
      ? `<img src="${imgPath}" onerror="this.style.display='none';this.parentNode.textContent='🎁'">`
      : (type === 'follow' ? '👤' : '🎁');

    card.innerHTML = `
      <div class="alert-icon">${typeof iconHtml === 'string' && iconHtml.startsWith('<img') ? iconHtml : `<span>${iconHtml}</span>`}</div>
      <div class="alert-body">
        <div class="alert-title">${type === 'follow' ? 'Theo dõi mới!' : 'Quà lớn!'}</div>
        <div class="alert-user">${esc(username)}</div>
        ${type === 'gift' ? `<div class="alert-sub">${esc(giftName || '')}</div>` : '<div class="alert-sub">vừa theo dõi kênh</div>'}
      </div>
      ${type === 'gift' && diamonds ? `<div class="alert-diamonds">💎 ${diamonds.toLocaleString()}</div>` : ''}
      <div class="progress-bar"></div>
    `;

    container.appendChild(card);

    setTimeout(() => {
      card.classList.add('exit');
      setTimeout(() => card.remove(), 350);
    }, 4000);
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
