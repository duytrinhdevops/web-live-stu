<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Test Google TTS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Segoe UI, sans-serif; background: #1a1a2e; color: #eee; padding: 30px; }
    h2 { margin-bottom: 20px; color: #a78bfa; }
    label { display: block; margin-bottom: 5px; font-size: 13px; color: #aaa; }
    textarea {
      width: 100%; height: 100px; padding: 10px; font-size: 15px;
      background: #16213e; border: 1px solid #444; border-radius: 8px;
      color: #fff; resize: vertical; outline: none;
    }
    textarea:focus { border-color: #a78bfa; }
    .row { display: flex; gap: 14px; align-items: flex-end; margin-top: 14px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    select {
      background: #16213e; border: 1px solid #444; border-radius: 6px;
      color: #eee; padding: 7px 10px; font-size: 14px; outline: none;
    }
    .slider-row { display: flex; align-items: center; gap: 8px; }
    input[type=range] { accent-color: #a78bfa; width: 120px; }
    .val { min-width: 42px; font-size: 13px; color: #c4b5fd; }
    button {
      padding: 9px 20px; border: none; border-radius: 8px; font-size: 14px;
      cursor: pointer; font-weight: 600; transition: opacity .15s; white-space: nowrap;
    }
    button:active { opacity: .7; }
    #btnPlay { background: #7c3aed; color: #fff; }
    #btnStop { background: #dc2626; color: #fff; }
    #status { margin-top: 12px; font-size: 13px; min-height: 20px; }
    .hint { font-size: 12px; color: #4b5563; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>&#128266; Test Google TTS</h2>

  <label>Van ban (Ctrl+Enter de phat):</label>
  <textarea id="txt" placeholder="Vi du: ban co cute khong, xin chao moi nguoi..."></textarea>

  <div class="row">
    <div class="field">
      <label>Ngon ngu</label>
      <select id="lang">
        <option value="vi">Tieng Viet (vi)</option>
        <option value="en">English (en)</option>
        <option value="zh-CN">Tieng Trung (zh-CN)</option>
      </select>
    </div>
    <div class="field">
      <label>Am luong</label>
      <div class="slider-row">
        <input type="range" id="vol" min="10" max="200" value="100" step="5"
               oninput="document.getElementById('volVal').textContent=this.value+'%'">
        <span class="val" id="volVal">100%</span>
      </div>
    </div>
    <div class="field">
      <label>Toc do</label>
      <div class="slider-row">
        <input type="range" id="rate" min="25" max="200" value="100" step="5"
               oninput="document.getElementById('rateVal').textContent=(this.value/100).toFixed(2)+'x'">
        <span class="val" id="rateVal">1.00x</span>
      </div>
    </div>
    <button id="btnPlay" onclick="play()">&#9654; Phat</button>
    <button id="btnStop" onclick="stopAll()">&#9632; Dung</button>
  </div>

  <div id="status"></div>
  <p class="hint">Ctrl+Enter de phat.</p>

  <script>
    var _ac  = null;
    var _src = null;

    function cp(n)    { return String.fromCharCode(n); }
    function rng(a,b) { return cp(a) + '-' + cp(b); }
    var EXOTIC_SP = new RegExp('['+cp(0xA0)+cp(0x1680)+rng(0x2000,0x200A)+cp(0x202F)+cp(0x205F)+cp(0x3000)+']','g');
    var INVISIBLE  = new RegExp('['+rng(0x200B,0x200F)+rng(0x2028,0x202E)+rng(0x2060,0x206F)+cp(0xFEFF)+']','g');
    var EMOJI_RE   = /[\u{1F300}-\u{1FAFF}\u{2300}-\u{27BF}\u{FE00}-\u{FEFF}\u{200D}\u{20D0}-\u{20FF}]/gu;

    function getAc() {
      if (!_ac || _ac.state === 'closed')
        _ac = new (window.AudioContext || window.webkitAudioContext)();
      return _ac;
    }

    function setStatus(msg, color) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.style.color = color || '#facc15';
    }

    function stopAll() {
      if (_src) { try { _src.stop(); } catch(e){} _src = null; }
      setStatus('Da dung.', '#9ca3af');
    }

    function processText(text) {
      var t = text.normalize('NFC');
      t = t.replace(EXOTIC_SP, ' ');
      t = t.replace(INVISIBLE, '');
      t = t.replace(/https?:\/\/\S+/gi, '');
      t = t.replace(/www\.\S+/gi, '');
      t = t.replace(/@[a-zA-Z0-9_.]+/g, '');
      t = t.replace(/#\S+/g, '');
      t = t.replace(EMOJI_RE, '');
      t = t.replace(/(.)\1{4,}/gu, '$1$1');
      return t.replace(/\s+/g, ' ').trim();
    }

    async function play() {
      stopAll();
      var raw = document.getElementById('txt').value.trim();
      if (!raw) { setStatus('Nhap van ban truoc!', '#f87171'); return; }

      var text = processText(raw);
      if (!text) { setStatus('Text trong sau khi loc.', '#f87171'); return; }

      var lang = document.getElementById('lang').value;
      var vol  = Number(document.getElementById('vol').value);
      var rate = Number(document.getElementById('rate').value);

      setStatus('Dang tai...', '#facc15');
      try {
        var url  = '/tts-audio?text=' + encodeURIComponent(text) + '&lang=' + encodeURIComponent(lang);
        var resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        var buf  = await resp.arrayBuffer();
        if (!buf.byteLength) throw new Error('Audio rong');

        var ac       = getAc();
        await ac.resume();
        var audioBuf = await ac.decodeAudioData(buf);

        var src  = ac.createBufferSource();
        src.buffer = audioBuf;
        src.playbackRate.value = Math.min(4, Math.max(0.25, rate / 100));

        var gain = ac.createGain();
        gain.gain.value = vol / 100;

        var comp = ac.createDynamicsCompressor();
        comp.threshold.value = -12; comp.knee.value = 6;
        comp.ratio.value = 4; comp.attack.value = 0.003; comp.release.value = 0.1;

        src.connect(gain); gain.connect(comp); comp.connect(ac.destination);
        _src = src;
        src.onended = function() { _src = null; setStatus('Phat xong.', '#6ee7b7'); };
        src.start();
        setStatus('Dang phat...', '#6ee7b7');
      } catch(e) {
        setStatus('Loi: ' + e.message, '#f87171');
      }
    }

    document.getElementById('txt').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); play(); }
    });
  </script>
</body>
</html>
