<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Test Google TTS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Segoe UI, sans-serif; background: #1a1a2e; color: #eee; padding: 30px; }
    h2 { margin-bottom: 20px; color: #a78bfa; }
    label { display: block; margin-bottom: 5px; font-size: 13px; color: #aaa; }
    textarea {
      width: 100%; height: 100px; padding: 10px; font-size: 15px;
      background: #16213e; border: 1px solid #444; border-radius: 8px;
      color: #fff; resize: vertical; outline: none;
    }
    textarea:focus { border-color: #a78bfa; }
    .row { display: flex; gap: 14px; align-items: flex-end; margin-top: 14px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    select {
      background: #16213e; border: 1px solid #444; border-radius: 6px;
      color: #eee; padding: 7px 10px; font-size: 14px; outline: none;
    }
    .slider-row { display: flex; align-items: center; gap: 8px; }
    input[type=range] { accent-color: #a78bfa; width: 120px; }
    .val { min-width: 42px; font-size: 13px; color: #c4b5fd; }
    button {
      padding: 9px 20px; border: none; border-radius: 8px; font-size: 14px;
      cursor: pointer; font-weight: 600; transition: opacity .15s; white-space: nowrap;
    }
    button:active { opacity: .7; }
    #btnPlay { background: #7c3aed; color: #fff; }
    #btnStop { background: #dc2626; color: #fff; }
    .info-box {
      margin-top: 14px; padding: 12px 14px; background: #0f3460;
      border-radius: 8px; font-size: 13px; line-height: 1.8;
    }
    .lbl { color: #a78bfa; font-weight: 600; margin-bottom: 4px; display: block; }
    #status    { margin-top: 12px; font-size: 13px; min-height: 20px; }
    #segments  { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .seg-vi    { background: #1e3a5f; padding: 3px 8px; border-radius: 4px; color: #93c5fd; }
    .seg-en    { background: #3b2d5c; padding: 3px 8px; border-radius: 4px; color: #c4b5fd; }
    .seg-vi::before { content: "VI "; font-size: 10px; opacity: .6; }
    .seg-en::before { content: "EN "; font-size: 10px; opacity: .6; }
    .hint { font-size: 12px; color: #4b5563; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>&#128266; Test Google TTS</h2>

  <label>Van ban (Ctrl+Enter de phat):</label>
  <textarea id="txt" placeholder="Vi du: ban co cute khong, nice to meet you, xin chao moi nguoi..."></textarea>

  <div class="row">
    <div class="field">
      <label>Ngon ngu chinh</label>
      <select id="lang">
        <option value="vi">Tieng Viet (vi)</option>
        <option value="en">English (en)</option>
        <option value="zh-CN">Tieng Trung (zh-CN)</option>
      </select>
    </div>
    <div class="field">
      <label>Am luong</label>
      <div class="slider-row">
        <input type="range" id="vol" min="10" max="200" value="100" step="5"
               oninput="document.getElementById('volVal').textContent=this.value+'%'">
        <span class="val" id="volVal">100%</span>
      </div>
    </div>
    <div class="field">
      <label>Toc do</label>
      <div class="slider-row">
        <input type="range" id="rate" min="25" max="200" value="100" step="5"
               oninput="document.getElementById('rateVal').textContent=(this.value/100).toFixed(2)+'x'">
        <span class="val" id="rateVal">1.00x</span>
      </div>
    </div>
    <button id="btnPlay" onclick="play()">&#9654; Phat</button>
    <button id="btnStop" onclick="stopAll()">&#9632; Dung</button>
  </div>

  <div id="status"></div>

  <div class="info-box" id="infoBox" style="display:none">
    <span class="lbl">Phan doan TTS (xanh = Tieng Viet, tim = English):</span>
    <div id="segments"></div>
  </div>

  <p class="hint">Ctrl+Enter de phat. Tu tieng Anh 3+ ky tu duoc tach rieng va doc bang giong EN.</p>

  <script>
    var _ac   = null;
    var _srcs = [];   // list of scheduled sources for stop()
    var _queue = [];  // [{text, lang, vol, rate}]
    var _playing = false;

    function cp(n)   { return String.fromCharCode(n); }
    function rng(a,b){ return cp(a) + '-' + cp(b); }
    var EXOTIC_SP = new RegExp('['+cp(0xA0)+cp(0x1680)+rng(0x2000,0x200A)+cp(0x202F)+cp(0x205F)+cp(0x3000)+']','g');
    var INVISIBLE  = new RegExp('['+rng(0x200B,0x200F)+rng(0x2028,0x202E)+rng(0x2060,0x206F)+cp(0xFEFF)+']','g');
    var EMOJI_RE   = /[\u{1F300}-\u{1FAFF}\u{2300}-\u{27BF}\u{FE00}-\u{FEFF}\u{200D}\u{20D0}-\u{20FF}]/gu;

    function getAc() {
      if (!_ac || _ac.state === 'closed')
        _ac = new (window.AudioContext || window.webkitAudioContext)();
      return _ac;
    }

    function setStatus(msg, color) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.style.color = color || '#facc15';
    }

    function stopAll() {
      _queue = [];
      _playing = false;
      _srcs.forEach(function(s){ try { s.stop(); } catch(e){} });
      _srcs = [];
      setStatus('Da dung.', '#9ca3af');
    }

    async function playSegment(seg) {
      var url = '/tts-audio?text=' + encodeURIComponent(seg.text) + '&lang=' + encodeURIComponent(seg.lang);
      var resp = await fetch(url);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      var buf  = await resp.arrayBuffer();
      if (!buf.byteLength) throw new Error('Audio rong');

      var ac      = getAc();
      await ac.resume();
      var audioBuf = await ac.decodeAudioData(buf);

      var src  = ac.createBufferSource();
      src.buffer = audioBuf;
      src.playbackRate.value = Math.min(4, Math.max(0.25, seg.rate / 100));

      var gain = ac.createGain();
      gain.gain.value = seg.vol / 100;

      var comp = ac.createDynamicsCompressor();
      comp.threshold.value = -12; comp.knee.value = 6;
      comp.ratio.value = 4; comp.attack.value = 0.003; comp.release.value = 0.1;

      src.connect(gain); gain.connect(comp); comp.connect(ac.destination);
      _srcs.push(src);

      return new Promise(function(resolve) {
        src.onended = function() {
          _srcs = _srcs.filter(function(s){ return s !== src; });
          resolve();
        };
        src.start();
      });
    }

    async function drainQueue() {
      if (_playing) return;
      _playing = true;
      while (_queue.length > 0) {
        var seg = _queue.shift();
        setStatus('Dang phat [' + seg.lang.toUpperCase() + ']: ' + seg.text, '#6ee7b7');
        try { await playSegment(seg); } catch(e) { setStatus('Loi: ' + e.message, '#f87171'); }
        await new Promise(function(r){ setTimeout(r, 80); }); // small gap between segments
      }
      _playing = false;
      if (_srcs.length === 0) setStatus('Phat xong.', '#6ee7b7');
    }

    async function play() {
      stopAll();
      var raw = document.getElementById('txt').value.trim();
      if (!raw) { setStatus('Nhap van ban truoc!', '#f87171'); return; }

      var processed = processText(raw);
      var lang   = document.getElementById('lang').value;
      var vol    = Number(document.getElementById('vol').value);
      var rate   = Number(document.getElementById('rate').value);

      var segments = splitByLang(processed, lang);

      // Show segments
      var segsEl = document.getElementById('segments');
      segsEl.innerHTML = '';
      if (!segments.length) {
        document.getElementById('infoBox').style.display = 'none';
        setStatus('Text trong sau khi loc.', '#f87171');
        return;
      }
      segments.forEach(function(s) {
        var span = document.createElement('span');
        span.className = s.lang === 'en' ? 'seg-en' : 'seg-vi';
        span.textContent = s.text;
        segsEl.appendChild(span);
      });
      document.getElementById('infoBox').style.display = 'block';

      // Enqueue and play
      segments.forEach(function(s) {
        _queue.push({ text: s.text, lang: s.lang, vol: vol, rate: rate });
      });
      drainQueue();
    }

    // Mirror server processText
    function processText(text) {
      var t = text.normalize('NFC');
      t = t.replace(EXOTIC_SP, ' ');
      t = t.replace(INVISIBLE, '');
      t = t.replace(/https?:\/\/\S+/gi, '');
      t = t.replace(/www\.\S+/gi, '');
      t = t.replace(/@[a-zA-Z0-9_.]+/g, '');
      t = t.replace(/#\S+/g, '');
      t = t.replace(EMOJI_RE, '');
      t = t.replace(/(.)\1{4,}/gu, '$1$1');
      return t.replace(/\s+/g, ' ').trim();
    }

    // Mirror server splitByLang
    function splitByLang(text, baseLang) {
      if (baseLang !== 'vi') return [{ text: text, lang: baseLang }];
      var parts = text.split(/(\b[a-zA-Z]{3,}\b)/g);
      var raw = parts.map(function(t, i) {
        return { text: t.replace(/\s+/g, ' ').trim(), lang: i % 2 === 1 ? 'en' : 'vi' };
      }).filter(function(s){ return s.text; });
      var merged = [];
      raw.forEach(function(s) {
        if (merged.length && merged[merged.length-1].lang === s.lang) {
          merged[merged.length-1].text += ' ' + s.text;
        } else {
          merged.push({ text: s.text, lang: s.lang });
        }
      });
      return merged.filter(function(s){ return s.text.trim(); });
    }

    document.getElementById('txt').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); play(); }
    });
  </script>
</body>
</html>
