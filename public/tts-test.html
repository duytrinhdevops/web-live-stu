<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Test Google TTS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Segoe UI, sans-serif; background: #1a1a2e; color: #eee; padding: 30px; }
    h2 { margin-bottom: 20px; color: #a78bfa; }
    label { display: block; margin-bottom: 5px; font-size: 13px; color: #aaa; }
    textarea {
      width: 100%; height: 110px; padding: 10px; font-size: 15px;
      background: #16213e; border: 1px solid #444; border-radius: 8px;
      color: #fff; resize: vertical; outline: none;
    }
    textarea:focus { border-color: #a78bfa; }
    .row { display: flex; gap: 16px; align-items: flex-end; margin-top: 14px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    select {
      background: #16213e; border: 1px solid #444; border-radius: 6px;
      color: #eee; padding: 7px 10px; font-size: 14px; outline: none;
    }
    .slider-row { display: flex; align-items: center; gap: 8px; }
    input[type=range] { accent-color: #a78bfa; width: 130px; }
    .val { min-width: 44px; font-size: 13px; color: #c4b5fd; }
    button {
      padding: 9px 22px; border: none; border-radius: 8px; font-size: 14px;
      cursor: pointer; font-weight: 600; transition: opacity .15s;
    }
    button:active { opacity: .7; }
    #btnPlay { background: #7c3aed; color: #fff; }
    #btnStop { background: #dc2626; color: #fff; }
    .info-box {
      margin-top: 16px; padding: 12px 14px; background: #0f3460;
      border-radius: 8px; font-size: 13px; line-height: 1.7;
    }
    .lbl { color: #a78bfa; font-weight: 600; margin-bottom: 3px; display: block; }
    #processed { color: #6ee7b7; word-break: break-all; }
    #status { margin-top: 12px; font-size: 13px; min-height: 20px; }
    .hint { font-size: 12px; color: #555; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>&#128266; Test Google TTS</h2>

  <label>Nhap van ban muon doc (Ctrl+Enter de phat):</label>
  <textarea id="txt" placeholder="Nhap text tieng Viet..."></textarea>

  <div class="row">
    <div class="field">
      <label>Ngon ngu</label>
      <select id="lang">
        <option value="vi">Tieng Viet (vi)</option>
        <option value="en">English (en)</option>
        <option value="zh-CN">Tieng Trung (zh-CN)</option>
      </select>
    </div>
    <div class="field">
      <label>Am luong</label>
      <div class="slider-row">
        <input type="range" id="vol" min="10" max="200" value="100" step="5"
               oninput="document.getElementById('volVal').textContent=this.value+'%'">
        <span class="val" id="volVal">100%</span>
      </div>
    </div>
    <div class="field">
      <label>Toc do</label>
      <div class="slider-row">
        <input type="range" id="rate" min="25" max="200" value="100" step="5"
               oninput="document.getElementById('rateVal').textContent=(this.value/100).toFixed(2)+'x'">
        <span class="val" id="rateVal">1.00x</span>
      </div>
    </div>
    <button id="btnPlay" onclick="play()">&#9654; Phat</button>
    <button id="btnStop" onclick="stop()">&#9632; Dung</button>
  </div>

  <div id="status"></div>

  <div class="info-box" id="infoBox" style="display:none">
    <span class="lbl">Text thuc su gui toi Google TTS (sau khi loc):</span>
    <span id="processed"></span>
  </div>

  <p class="hint">* Goi truc tiep /tts-audio - cung pipeline voi live stream.</p>

  <script>
    var _ac  = null;
    var _src = null;

    // Build regex from code points - avoids raw Unicode control chars in source
    function cp(n)  { return String.fromCharCode(n); }
    function rng(a,b){ return cp(a) + '-' + cp(b); }
    // Exotic whitespace: U+00A0 NBSP, U+1680, U+2000-U+200A, U+202F, U+205F, U+3000
    var EXOTIC_SP = new RegExp('[' + cp(0xA0) + cp(0x1680) + rng(0x2000,0x200A) + cp(0x202F) + cp(0x205F) + cp(0x3000) + ']', 'g');
    // Invisible: U+200B-U+200F, U+2028-U+202E, U+2060-U+206F, U+FEFF
    var INVISIBLE  = new RegExp('[' + rng(0x200B,0x200F) + rng(0x2028,0x202E) + rng(0x2060,0x206F) + cp(0xFEFF) + ']', 'g');
    var EMOJI_RE   = /[\u{1F300}-\u{1FAFF}\u{2300}-\u{27BF}\u{FE00}-\u{FEFF}\u{200D}\u{20D0}-\u{20FF}]/gu;

    function getAc() {
      if (!_ac || _ac.state === 'closed')
        _ac = new (window.AudioContext || window.webkitAudioContext)();
      return _ac;
    }

    function setStatus(msg, color) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.style.color = color || '#facc15';
    }

    function stop() {
      if (_src) { try { _src.stop(); } catch(e){} _src = null; }
      setStatus('Da dung.', '#9ca3af');
    }

    async function play() {
      stop();
      var raw = document.getElementById('txt').value.trim();
      if (!raw) { setStatus('Nhap van ban truoc!', '#f87171'); return; }

      var processed = processText(raw);
      document.getElementById('processed').textContent = processed || '(trong sau khi loc)';
      document.getElementById('infoBox').style.display = 'block';

      if (!processed) {
        setStatus('Text bi xoa het sau khi loc (chi co URL/emoji/mention?)', '#f87171');
        return;
      }

      var lang    = document.getElementById('lang').value;
      var volPct  = Number(document.getElementById('vol').value);
      var ratePct = Number(document.getElementById('rate').value);
      var url     = '/tts-audio?text=' + encodeURIComponent(processed) + '&lang=' + encodeURIComponent(lang);

      setStatus('Dang tai audio tu Google...', '#facc15');

      try {
        var resp = await fetch(url);
        if (!resp.ok) throw new Error('Server tra ve HTTP ' + resp.status);
        var arrayBuf = await resp.arrayBuffer();
        if (!arrayBuf.byteLength) throw new Error('Audio rong - Google TTS co the bi chan');

        var ac = getAc();
        await ac.resume();

        var audioBuf = await ac.decodeAudioData(arrayBuf);

        var src = ac.createBufferSource();
        src.buffer = audioBuf;
        src.playbackRate.value = Math.min(4, Math.max(0.25, ratePct / 100));

        var gain = ac.createGain();
        gain.gain.value = volPct / 100;

        var comp = ac.createDynamicsCompressor();
        comp.threshold.value = -12;
        comp.knee.value = 6;
        comp.ratio.value = 4;
        comp.attack.value = 0.003;
        comp.release.value = 0.1;

        src.connect(gain);
        gain.connect(comp);
        comp.connect(ac.destination);

        _src = src;
        src.onended = function() { setStatus('Phat xong.', '#6ee7b7'); _src = null; };
        src.start();
        setStatus('Dang phat...', '#6ee7b7');

      } catch(err) {
        setStatus('Loi: ' + err.message, '#f87171');
      }
    }

    // Mirror server processText
    function processText(text) {
      var t = text.normalize('NFC');
      t = t.replace(EXOTIC_SP, ' ');
      t = t.replace(INVISIBLE, '');
      t = t.replace(/https?:\/\/\S+/gi, '');
      t = t.replace(/www\.\S+/gi, '');
      t = t.replace(/@[a-zA-Z0-9_.]+/g, '');
      t = t.replace(/#\S+/g, '');
      t = t.replace(EMOJI_RE, '');
      t = t.replace(/(.)\1{4,}/gu, '$1$1');
      return t.replace(/\s+/g, ' ').trim();
    }

    document.getElementById('txt').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); play(); }
    });
  </script>
</body>
</html>
